; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3-lite]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions_ota.csv
build_flags =
    -DCORE_DEBUG_LEVEL=4
    ; FastLED 3.10.3 still touches deprecated ESP-IDF LCD alignment fields on ESP32-S3.
    -Wno-deprecated-declarations
    ; Keep optional dependency probes quiet while building against Arduino-ESP32 3.x / ESP-IDF 5.x.
    -Wno-cpp
lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    fastled/FastLED @ ^3.10.3

[env:m5stack-atoms3-lite-ota]
extends = env:m5stack-atoms3-lite
upload_protocol = espota
upload_port = atoms3mic.local
upload_flags =
    --port=3232
